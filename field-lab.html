<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FIELD LAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700;800&family=Bungee&display=swap" rel="stylesheet">
  <style>
:root{--navy:#082c5c;--blue:#0d5d9e;--gold:#f7b733;--cream:#fff7df;--ink:#10243d;--card:rgba(255,255,255,.92);--shadow:0 22px 60px rgba(0,0,0,.28)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:'Atkinson Hyperlegible',system-ui,sans-serif;color:var(--ink);background:#081b33}body{overflow-x:hidden}.screen{min-height:100vh;position:relative;background-size:cover;background-position:center;display:grid;place-items:center;padding:24px}.veil{position:absolute;inset:0;background:linear-gradient(90deg,rgba(3,16,36,.78),rgba(3,16,36,.35),rgba(3,16,36,.78));pointer-events:none}.hud{position:absolute;top:16px;left:16px;right:16px;z-index:5;display:flex;gap:12px;align-items:center;justify-content:space-between}.pill{background:rgba(255,255,255,.9);border:2px solid rgba(255,255,255,.6);border-radius:999px;padding:9px 14px;font-weight:900;font-size:14px;letter-spacing:.06em;color:var(--navy);box-shadow:0 8px 24px rgba(0,0,0,.18)}.home-link{color:var(--navy);text-decoration:none}.stage{position:relative;z-index:2;width:min(1120px,96vw);min-height:76vh;display:grid;grid-template-columns:1.05fr .95fr;gap:22px;align-items:center}.panel{background:var(--card);border:3px solid rgba(255,255,255,.75);border-radius:28px;padding:28px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}.title{font-family:'Bungee',system-ui,sans-serif;font-size:clamp(34px,6vw,72px);line-height:1;margin:0 0 10px;color:white;text-shadow:0 8px 0 rgba(0,0,0,.22)}.subtitle{font-size:clamp(18px,2.3vw,26px);line-height:1.5;color:#fff;margin:0 0 20px;font-weight:800}.mission-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.choice{appearance:none;border:0;text-align:left;border-radius:22px;background:linear-gradient(180deg,#fff,#eaf4ff);padding:18px;min-height:130px;cursor:pointer;box-shadow:0 12px 26px rgba(0,0,0,.2);border:3px solid rgba(8,44,92,.1);transition:.2s transform,.2s box-shadow}.choice:hover,.choice:focus{transform:translateY(-4px);box-shadow:0 18px 38px rgba(0,0,0,.26);outline:4px solid rgba(247,183,51,.55)}.choice strong{display:block;font-family:'Bungee',system-ui,sans-serif;color:var(--navy);font-size:20px;line-height:1.1;margin-bottom:8px}.choice span{font-size:18px;line-height:1.45}.mascot{width:min(300px,35vw);filter:drop-shadow(0 22px 22px rgba(0,0,0,.35));animation:float 1.8s ease-in-out infinite alternate}.mascot-wrap{text-align:center}.map-card{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.35);border-radius:34px;padding:20px;min-height:440px;position:relative;overflow:hidden;box-shadow:var(--shadow)}.explore-scene{position:relative;height:52vh;min-height:380px;border-radius:28px;background-size:cover;background-position:center;overflow:hidden;border:4px solid rgba(255,255,255,.65);box-shadow:var(--shadow)}.explore-scene:after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.35),rgba(0,0,0,.05) 45%,rgba(255,255,255,.08));pointer-events:none}.scene-falcon{position:absolute;z-index:2;left:5%;bottom:8%;width:min(190px,25vw);filter:drop-shadow(0 18px 16px rgba(0,0,0,.35));animation:float 1.1s ease-in-out infinite alternate}.hotspot{position:absolute;z-index:4;border:0;border-radius:999px;background:var(--gold);color:#082c5c;font-weight:1000;font-size:16px;letter-spacing:.05em;padding:13px 16px;box-shadow:0 8px 0 #b76e00,0 14px 24px rgba(0,0,0,.28);cursor:pointer;transform:translate(-50%,-50%);animation:pulse 1.4s ease-in-out infinite alternate}.hotspot.done{background:#7ee081;box-shadow:0 8px 0 #2e8b46,0 14px 24px rgba(0,0,0,.22)}.hotspot:hover,.hotspot:focus{outline:4px solid white}.drawer{position:absolute;right:22px;bottom:22px;z-index:6;width:min(430px,88vw);background:rgba(255,255,255,.95);border-radius:24px;border:3px solid white;padding:20px;box-shadow:var(--shadow);display:none}.drawer.show{display:block}.drawer h2{font-family:'Bungee';font-size:24px;margin:0 0 8px;color:var(--navy)}.drawer p{font-size:19px;line-height:1.55;margin:0 0 12px}.drawer .small{font-size:16px;color:#39516b;font-weight:800}.go{border:0;border-radius:18px;background:linear-gradient(180deg,var(--gold),#e48619);color:#111;font-family:'Bungee';font-size:18px;padding:14px 18px;cursor:pointer;box-shadow:0 8px 0 #a85b09}.go.secondary{background:linear-gradient(180deg,#cdefff,#7cc8ff);box-shadow:0 8px 0 #2383c2}.progress{height:16px;background:rgba(255,255,255,.35);border-radius:999px;overflow:hidden;border:2px solid rgba(255,255,255,.65)}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#fff176);transition:.3s}.mini-task{display:grid;gap:12px;margin-top:10px}.mini-option{border:3px solid #d4e4f6;border-radius:18px;background:#fff;padding:13px;text-align:left;font-size:18px;font-weight:800;cursor:pointer}.mini-option:hover,.mini-option:focus{outline:4px solid rgba(247,183,51,.45)}.mini-option.selected{border-color:var(--gold);background:#fff4bf}.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.badge{background:#082c5c;color:white;border-radius:999px;padding:8px 12px;font-weight:900;font-size:14px}.finish-card{text-align:center}.finish-card h1{font-family:'Bungee';font-size:clamp(36px,5vw,64px);color:var(--navy);line-height:1;margin:0 0 12px}.finish-card p{font-size:21px;line-height:1.55}.hidden{display:none!important}@keyframes float{to{transform:translateY(-12px)}}@keyframes pulse{to{transform:translate(-50%,-50%) scale(1.07)}}@media(max-width:850px){.stage{grid-template-columns:1fr}.mission-grid,.topic-grid{grid-template-columns:1fr}.title{font-size:42px}.subtitle{font-size:19px}.mascot{width:210px}.explore-scene{height:58vh}.scene-falcon{width:135px}.drawer{left:12px;right:12px;bottom:12px;width:auto}.hud{position:fixed}.screen{padding-top:80px}}
</style>
</head>
<body>
  <main id="app" class="screen" style="background-image:url('bg-lab.png')">
    <div class="veil"></div>
    <div class="hud"><a class="pill home-link" href="index.html">CAMP HOME</a><div class="pill" id="rank">MISSION READY</div></div>
    <section class="stage" id="home">
      <div>
        <h1 class="title">FIELD LAB</h1>
        <p class="subtitle">Choose a science mission. Scan the habitat, animal, or weather scene.</p>
        <div class="mission-grid" id="missionGrid"></div>
      </div>
      <div class="mascot-wrap"><img class="mascot" src="falcon-science.png" alt=""><div class="panel"><strong>SCIENCE CREW</strong><p style="font-size:19px;line-height:1.55;margin:8px 0 0">Pick a mission. Explore the scene. Collect what you need.</p></div></div>
    </section>
    <section class="stage hidden" id="topics">
      <div><h1 class="title" id="topicTitle"></h1><p class="subtitle" id="topicSub"></p><div class="topic-grid" id="topicGrid"></div></div>
      <div class="mascot-wrap"><img class="mascot" src="falcon-science.png" alt=""></div>
    </section>
    <section class="stage hidden" id="explore" style="grid-template-columns:1fr">
      <div><h1 class="title" id="sceneTitle"></h1><div class="progress"><div class="bar" id="bar"></div></div></div>
      <div class="explore-scene" id="scene"><img class="scene-falcon" src="falcon-science.png" alt=""><div id="hotspots"></div><aside class="drawer" id="drawer"></aside></div>
    </section>
    <section class="stage hidden" id="finish"><div class="panel finish-card"><h1>MISSION READY</h1><p id="finishText"></p><div class="badge-row" id="badges"></div><button class="go" id="again">PICK ANOTHER MISSION</button> <a class="go secondary" style="display:inline-block;text-decoration:none;margin-left:8px" href="index.html">BACK TO CAMP</a></div><div class="mascot-wrap"><img class="mascot" src="falcon-science.png" alt=""></div></section>
  </main>
<script>

const MISSIONS = {
  habitat:{title:'SAVE THE HABITAT', sub:'Choose an ecosystem to protect.', badge:'HABITAT HERO', topics:{
    desert:{name:'Desert', bg:'bg-canyon.png', stations:[
      ['HABITAT SCAN','Deserts are dry ecosystems. Many plants and animals survive with very little water.','Vocabulary idea: ecosystem, drought, adaptation'],
      ['FOOD CHAIN','A desert food chain could be: sun → cactus → insect → lizard → hawk.','Use arrows and labels on your one-pager.'],
      ['THREAT ALERT','Drought, habitat loss, and pollution can make desert life harder.','Choose one threat to explain.'],
      ['PROTECT IT','People can save water, protect open land, and keep trash out of habitats.','Pick one plan that people can really do.']
    ], evidence:['Desert animals have body parts and behaviors that help them save water. (Paragraph 2)','A food chain shows how energy moves through living things. (Paragraph 4)']},
    rainforest:{name:'Rainforest', bg:'bg-forest.png', stations:[['HABITAT SCAN','Rainforests are warm, wet forests with many layers of plants and animals.','Vocabulary idea: canopy, producer, consumer'],['FOOD CHAIN','A rainforest food chain could be: sun → fruit tree → monkey → jaguar.','Show energy moving in order.'],['THREAT ALERT','Cutting down trees can destroy homes for many living things.','This is called habitat loss.'],['PROTECT IT','People can protect forests, plant trees, and use resources carefully.','Choose a protection plan.']], evidence:['Rainforests have many kinds of plants and animals living together. (Paragraph 1)','The canopy is an upper layer of trees where many animals live. (Paragraph 3)']},
    ocean:{name:'Ocean', bg:'bg-ocean.png', stations:[['HABITAT SCAN','Oceans are large saltwater habitats. Many living things depend on sunlight, plants, and clean water.','Vocabulary idea: plankton, habitat, pollution'],['FOOD CHAIN','An ocean food chain could be: sun → plankton → small fish → shark.','Keep the arrows in order.'],['THREAT ALERT','Plastic trash and dirty water can harm ocean animals.','Choose one ocean threat.'],['PROTECT IT','People can use less plastic, clean beaches, and protect ocean habitats.','Pick one action people can take.']], evidence:['Plankton are tiny living things that can be part of ocean food chains. (Paragraph 2)','Pollution can make ocean habitats unsafe for animals. (Paragraph 5)']},
    grassland:{name:'Grassland', bg:'bg-area.png', stations:[['HABITAT SCAN','Grasslands have wide open spaces with many grasses and fewer trees.','Vocabulary idea: prairie, grazer, shelter'],['FOOD CHAIN','A grassland food chain could be: sun → grass → rabbit → fox.','Label every part.'],['THREAT ALERT','Wildfire, drought, and habitat loss can change grasslands.','Choose one threat to explain.'],['PROTECT IT','People can protect open land and help native plants grow.','Pick one realistic plan.']], evidence:['Grasslands are home to animals that graze, burrow, and hunt. (Paragraph 2)','Plants are producers because they make their own food. (Paragraph 4)']}
  }},
  animal:{title:'ANIMAL ADAPTATION SURVIVOR', sub:'Choose an animal and study how it survives.', badge:'SURVIVAL EXPERT', topics:{
    camel:{name:'Camel', bg:'bg-canyon.png', stations:[['HABITAT SCAN','Camels live in dry places where days can be hot and water can be hard to find.','Think climate and environment.'],['BODY ADAPTATIONS','Camels have wide feet, long eyelashes, and humps that store fat.','Choose 3 body adaptations.'],['BEHAVIOR MOVES','Camels can travel long distances and rest during extreme heat.','Choose 2 survival behaviors.'],['DANGERS','Heat, lack of water, and predators can threaten camels.','Rate survival from 1 to 10.']], evidence:['Camels have adaptations that help them survive in dry habitats. (Paragraph 2)','Wide feet help camels walk on sand. (Paragraph 3)']},
    polar:{name:'Polar Bear', bg:'bg-arctic.png', stations:[['HABITAT SCAN','Polar bears live in cold Arctic areas with ice and ocean water.','Think cold climate.'],['BODY ADAPTATIONS','Thick fur, fat layers, and large paws help polar bears survive.','Choose 3 body adaptations.'],['BEHAVIOR MOVES','Polar bears hunt on sea ice and swim when needed.','Choose 2 behaviors.'],['DANGERS','Melting ice can make hunting harder.','Rate survival from 1 to 10.']], evidence:['Thick fur and fat help polar bears stay warm. (Paragraph 2)','Polar bears depend on sea ice to hunt. (Paragraph 4)']},
    octopus:{name:'Octopus', bg:'bg-ocean.png', stations:[['HABITAT SCAN','Octopuses live in ocean habitats with rocks, reefs, and hiding places.','Think underwater environment.'],['BODY ADAPTATIONS','Octopuses have soft bodies, arms with suckers, and can change color.','Choose 3 body adaptations.'],['BEHAVIOR MOVES','They hide, squeeze into small spaces, and use ink to escape.','Choose 2 behaviors.'],['DANGERS','Predators and habitat changes can threaten octopuses.','Rate survival from 1 to 10.']], evidence:['An octopus can change color to blend into its habitat. (Paragraph 3)','Ink can help an octopus escape danger. (Paragraph 5)']},
    fox:{name:'Arctic Fox', bg:'bg-arctic.png', stations:[['HABITAT SCAN','Arctic foxes live in cold tundra habitats.','Think snow, wind, and cold.'],['BODY ADAPTATIONS','Thick fur, small ears, and seasonal camouflage help it survive.','Choose 3 body adaptations.'],['BEHAVIOR MOVES','It hunts small animals and may follow larger predators for food scraps.','Choose 2 behaviors.'],['DANGERS','Cold, hunger, and predators can threaten it.','Rate survival from 1 to 10.']], evidence:['White winter fur helps the Arctic fox blend in with snow. (Paragraph 3)','Small ears help reduce heat loss. (Paragraph 4)']},
    wren:{name:'Cactus Wren', bg:'bg-canyon.png', stations:[['HABITAT SCAN','Cactus wrens live in desert areas with cactus plants and dry weather.','Think desert shelter.'],['BODY ADAPTATIONS','A pointed beak, strong feet, and protective nesting choices help it survive.','Choose 3 body adaptations.'],['BEHAVIOR MOVES','It builds nests in cactus plants and searches for insects.','Choose 2 behaviors.'],['DANGERS','Predators, heat, and habitat loss can threaten cactus wrens.','Rate survival from 1 to 10.']], evidence:['Cactus wrens often build nests in cactus plants for protection. (Paragraph 2)','Desert birds must find food and shelter in hot, dry places. (Paragraph 4)']}
  }},
  weather:{title:'EXTREME WEATHER REPORTER', sub:'Choose a weather event and get ready to report.', badge:'WEATHER REPORTER', topics:{
    hurricane:{name:'Hurricane', bg:'bg-storm.png', stations:[['WEATHER WATCH','Hurricanes form over warm ocean water and bring strong winds and heavy rain.','Explain what causes it.'],['IMPACT REPORT','Hurricanes can cause flooding, power outages, and damage to homes.','Pick 3 effects.'],['SAFETY CENTER','People should listen to warnings, prepare supplies, and move away from danger if told.','Choose 3 safety tips.'],['NEWS DESK','Write a short forecast using clear reporter language.','Keep it calm and helpful.']], evidence:['Hurricanes form over warm ocean water. (Paragraph 2)','Storm surge and heavy rain can cause flooding. (Paragraph 5)']},
    tornado:{name:'Tornado', bg:'bg-storm.png', stations:[['WEATHER WATCH','Tornadoes are spinning columns of air that reach from a storm cloud to the ground.','Explain how it forms.'],['IMPACT REPORT','Tornadoes can damage buildings, trees, and roads.','Pick 3 effects.'],['SAFETY CENTER','People should go to a low, inside room away from windows.','Choose 3 safety tips.'],['NEWS DESK','Write a short warning forecast.','Use clear words.']], evidence:['A tornado is a spinning column of air. (Paragraph 1)','A safe place is low and away from windows. (Paragraph 4)']},
    blizzard:{name:'Blizzard', bg:'bg-arctic.png', stations:[['WEATHER WATCH','A blizzard has strong wind, blowing snow, and low visibility.','Explain what causes it.'],['IMPACT REPORT','Blizzards can close roads, make travel unsafe, and cause power problems.','Pick 3 effects.'],['SAFETY CENTER','People should stay inside, dress warmly, and keep emergency supplies.','Choose 3 safety tips.'],['NEWS DESK','Write a short winter weather report.','Tell people how to stay safe.']], evidence:['Blizzards combine snow, wind, and poor visibility. (Paragraph 2)','Travel can become dangerous during a blizzard. (Paragraph 4)']},
    flood:{name:'Flood', bg:'bg-ocean.png', stations:[['WEATHER WATCH','Floods happen when too much water covers land that is usually dry.','Explain what causes it.'],['IMPACT REPORT','Floods can damage homes, roads, and farms.','Pick 3 effects.'],['SAFETY CENTER','People should move to higher ground and never walk through moving water.','Choose 3 safety tips.'],['NEWS DESK','Write a short flood forecast.','Keep it clear and helpful.']], evidence:['A flood happens when water covers land that is usually dry. (Paragraph 1)','Moving floodwater can be dangerous. (Paragraph 5)']}
  }}
};

let currentMission=null,currentTopic=null,seen=new Set(),selectedEvidence=null;
const $=s=>document.querySelector(s);const $$=s=>[...document.querySelectorAll(s)];
function sound(f=520,t=.08){try{let a=new (window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(a.destination);g.gain.setValueAtTime(.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(.08,a.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+t);o.start();o.stop(a.currentTime+t+.02)}catch(e){}}
function show(id){['home','topics','explore','finish'].forEach(x=>$('#'+x).classList.toggle('hidden',x!==id))}
function init(){const mg=$('#missionGrid');Object.entries(MISSIONS).forEach(([key,m])=>{let b=document.createElement('button');b.className='choice';b.innerHTML=`<strong>${m.title}</strong><span>${m.sub}</span>`;b.onclick=()=>chooseMission(key);mg.appendChild(b)});$('#again').onclick=()=>{sound(400);show('home')}}
function chooseMission(key){sound(620);currentMission=key;currentTopic=null;seen=new Set();selectedEvidence=null;const m=MISSIONS[key];$('#topicTitle').textContent=m.title;$('#topicSub').textContent=m.sub;const tg=$('#topicGrid');tg.innerHTML='';Object.entries(m.topics).forEach(([tkey,t])=>{let b=document.createElement('button');b.className='choice';b.innerHTML=`<strong>${t.name}</strong><span>Open this case file.</span>`;b.onclick=()=>startExplore(tkey);tg.appendChild(b)});show('topics')}
function startExplore(tkey){sound(720);currentTopic=tkey;seen=new Set();selectedEvidence=null;const m=MISSIONS[currentMission],t=m.topics[tkey];$('#sceneTitle').textContent=t.name.toUpperCase();$('#scene').style.backgroundImage=`url('${t.bg||m.bg||'bg-camp.png'}')`;buildHotspots();show('explore')}
function buildHotspots(){const m=MISSIONS[currentMission],t=m.topics[currentTopic];const hs=$('#hotspots');hs.innerHTML='';$('#drawer').classList.remove('show');const spots=[[20,25],[52,28],[78,38],[42,72]];t.stations.forEach((st,i)=>{let b=document.createElement('button');b.className='hotspot'+(seen.has(i)?' done':'');b.style.left=spots[i][0]+'%';b.style.top=spots[i][1]+'%';b.textContent=seen.has(i)?'✓':'SCAN';b.onclick=()=>openStation(i);hs.appendChild(b)});let ev=document.createElement('button');ev.className='hotspot'+(selectedEvidence?' done':'');ev.style.left='75%';ev.style.top='72%';ev.textContent=selectedEvidence?'✓':'EVIDENCE';ev.onclick=openEvidence;hs.appendChild(ev);updateBar()}
function openStation(i){sound(520);const t=MISSIONS[currentMission].topics[currentTopic],st=t.stations[i];seen.add(i);$('#drawer').innerHTML=`<h2>${st[0]}</h2><p>${st[1]}</p><p class="small">${st[2]}</p><button class="go" onclick="closeDrawer()">COLLECT</button>`;$('#drawer').classList.add('show');buildHotspots()}
function openEvidence(){sound(560);const t=MISSIONS[currentMission].topics[currentTopic];let buttons=t.evidence.map((q,i)=>`<button class="mini-option ${selectedEvidence===q?'selected':''}" onclick="pickEvidence(${i})">${q}</button>`).join('');$('#drawer').innerHTML=`<h2>EVIDENCE PICKUP</h2><p>Choose one quote to use on your one-pager.</p><div class="mini-task">${buttons}</div>`;$('#drawer').classList.add('show')}
function pickEvidence(i){const t=MISSIONS[currentMission].topics[currentTopic];selectedEvidence=t.evidence[i];sound(850,.12);buildHotspots();$('#drawer').innerHTML=`<h2>QUOTE COLLECTED</h2><p>${selectedEvidence}</p><button class="go" onclick="closeDrawer()">KEEP GOING</button>`;$('#drawer').classList.add('show')}
function closeDrawer(){sound(440);$('#drawer').classList.remove('show');if(seen.size>=4&&selectedEvidence)finishMission()}
function updateBar(){let total=5,done=seen.size+(selectedEvidence?1:0);$('#bar').style.width=Math.round(done/total*100)+'%';$('#rank').textContent=`${done}/${total} CLUES`}
function finishMission(){const m=MISSIONS[currentMission],t=m.topics[currentTopic];let key='badge_'+m.badge.replaceAll(' ','_');localStorage.setItem(key,'yes');$('#finishText').textContent=`You explored ${t.name}. Now use your notes to make your one-pager.`;$('#badges').innerHTML=`<span class="badge">${m.badge}</span><span class="badge">${t.name.toUpperCase()}</span><span class="badge">EVIDENCE READY</span>`;sound(900,.15);setTimeout(()=>show('finish'),550)}
init();


</script>
</body>
</html>

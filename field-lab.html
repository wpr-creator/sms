<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Atkinson+Hyperlegible:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="lab-page">
  <div class="page-bg lab-bg" id="labBg"></div>
  <header class="topbar"><a href="index.html">← CAMP</a><div class="topbar-title">FIELD LAB</div><div>SCIENCE</div></header>
  <main class="lab-shell">
    <section class="mission-card" id="missionChooser">
      <p class="eyebrow">CHOOSE A SCIENCE MISSION</p>
      <h1>FIELD LAB</h1>
      <p class="kid-line">Pick a mission. Gather facts. Get ready for your one-pager.</p>
      <div class="mission-grid">
        <button class="choice-card" data-mission="habitat"><h3>SAVE THE HABITAT</h3><p>Explore an ecosystem and find ways to protect it.</p></button>
        <button class="choice-card" data-mission="animal"><h3>ADAPTATION SURVIVOR</h3><p>Study an animal and how it survives.</p></button>
        <button class="choice-card" data-mission="weather"><h3>WEATHER REPORTER</h3><p>Track extreme weather and safety tips.</p></button>
      </div>
    </section>
    <section class="mission-card hidden" id="topicChooser"></section>
    <section class="mission-card hidden reader-card" id="stationView"></section>
  </main>
  <img class="character-side" src="falcon-science.png" alt="Science falcon" onerror="this.style.display='none'">
  <script>
  const scienceData={
    habitat:{title:'SAVE THE HABITAT',topics:{
      Desert:{bg:'bg-canyon.png',stations:['A desert gets little rain. Many desert plants store water. Animals often rest during the hottest part of the day.','Food chain idea: Sun → cactus → insect → lizard → hawk. Each living thing has a role.','Threat: drought and habitat loss can make survival harder. People can protect deserts by saving water and staying on trails.','Evidence idea: Find one sentence that proves how plants or animals survive in a dry place.']},
      Rainforest:{bg:'bg-forest.png',stations:['Rainforests are warm and wet. Tall trees make layers. Many animals live in the trees.','Food chain idea: Sun → fruit tree → monkey → jaguar. Producers start the chain.','Threat: cutting down trees removes homes for many living things. People can protect forests by using resources wisely.','Evidence idea: Find one sentence that proves rainforests have many living things.']},
      Ocean:{bg:'bg-ocean.png',stations:['The ocean is a huge saltwater ecosystem. Many animals live near coral reefs, kelp forests, or the open sea.','Food chain idea: Sun → algae → small fish → larger fish → shark. Tiny producers matter.','Threat: pollution can harm ocean animals. People can help by keeping trash out of water.','Evidence idea: Find one sentence that proves the ocean has connected living things.']},
      Grassland:{bg:'bg-area.png',stations:['Grasslands have wide open land with many grasses. Some have dry seasons and rainy seasons.','Food chain idea: Sun → grass → grasshopper → bird → fox. Grass is an important producer.','Threat: wildfire, drought, and habitat loss can change grasslands. People can protect open spaces.','Evidence idea: Find one sentence that proves grasslands support animals.']}
    }},
    animal:{title:'ANIMAL ADAPTATION SURVIVOR',topics:{
      Camel:{bg:'bg-canyon.png',stations:['Camels live in hot, dry deserts. Their bodies help them survive with little water.','Physical adaptations: wide feet, long eyelashes, and humps that store fat.','Behavior adaptations: camels can travel far and rest during hot parts of the day.','Evidence idea: Find one quote that shows how a camel survives in the desert.']},
      'Polar Bear':{bg:'bg-arctic.png',stations:['Polar bears live in the Arctic. Their habitat is cold, icy, and snowy.','Physical adaptations: thick fur, fat layer, and large paws for walking on ice.','Behavior adaptations: polar bears hunt seals and travel across ice.','Evidence idea: Find one quote that shows how a polar bear survives in the cold.']},
      Octopus:{bg:'bg-ocean.png',stations:['Octopuses live in the ocean. They can hide in rocks and coral areas.','Physical adaptations: soft body, strong arms, and color-changing skin.','Behavior adaptations: they hide, squeeze into small spaces, and use ink to escape.','Evidence idea: Find one quote that shows how an octopus protects itself.']},
      'Arctic Fox':{bg:'bg-arctic.png',stations:['Arctic foxes live in cold tundra areas. Their fur helps them blend in.','Physical adaptations: thick fur, small ears, and seasonal camouflage.','Behavior adaptations: they dig dens and hunt small animals.','Evidence idea: Find one quote that shows how an arctic fox survives.']},
      'Cactus Wren':{bg:'bg-canyon.png',stations:['Cactus wrens live in dry desert areas. They often build nests in cactus plants.','Physical adaptations: curved beak, strong feet, and coloring that blends into dry habitats.','Behavior adaptations: they nest in cactus and search for insects.','Evidence idea: Find one quote that shows how this bird uses its habitat.']}
    }},
    weather:{title:'EXTREME WEATHER REPORTER',topics:{
      Hurricane:{bg:'bg-storm.png',stations:['A hurricane is a powerful storm that forms over warm ocean water.','It can bring strong winds, heavy rain, flooding, and storm surge.','Safety tips: listen to warnings, move away from flood areas, and keep emergency supplies.','Evidence idea: Find one quote that explains what causes a hurricane.']},
      Tornado:{bg:'bg-storm.png',stations:['A tornado is a spinning column of air that reaches from a storm cloud to the ground.','It can damage buildings, trees, cars, and power lines.','Safety tips: go to a low room, stay away from windows, and protect your head.','Evidence idea: Find one quote that explains why tornadoes are dangerous.']},
      Blizzard:{bg:'bg-arctic.png',stations:['A blizzard is a snowstorm with strong winds and low visibility.','It can make roads unsafe and cause people to lose power or heat.','Safety tips: stay indoors, wear warm layers, and keep food and water ready.','Evidence idea: Find one quote that explains what makes a blizzard extreme.']},
      Flood:{bg:'bg-ocean.png',stations:['A flood happens when water covers land that is usually dry.','Floods can happen after heavy rain, storms, or overflowing rivers.','Safety tips: never walk through floodwater, move to higher ground, and listen to warnings.','Evidence idea: Find one quote that explains how flooding affects people.']}
    }}
  };
  let missionKey=null,topic=null,station=0;
  const $=id=>document.getElementById(id), bg=$('labBg');
  document.querySelectorAll('[data-mission]').forEach(b=>b.onclick=()=>chooseMission(b.dataset.mission));
  function chooseMission(key){missionKey=key;const data=scienceData[key];$('missionChooser').classList.add('hidden');$('topicChooser').classList.remove('hidden');$('topicChooser').innerHTML=`<p class="eyebrow">${data.title}</p><h1>CHOOSE YOUR TOPIC</h1><div class="mission-grid">${Object.keys(data.topics).map(t=>`<button class="choice-card" data-topic="${t}"><h3>${t}</h3><p>Open the research file.</p></button>`).join('')}</div><div class="station-nav"><button class="small-btn" onclick="backHome()">BACK</button></div>`;document.querySelectorAll('[data-topic]').forEach(b=>b.onclick=()=>chooseTopic(b.dataset.topic));}
  function chooseTopic(t){topic=t;station=0;showStation();}
  function showStation(){const item=scienceData[missionKey].topics[topic]; bg.style.backgroundImage=`linear-gradient(100deg,rgba(7,24,61,.62),rgba(7,24,61,.18)),url('${item.bg}')`;$('topicChooser').classList.add('hidden');$('stationView').classList.remove('hidden');const titles=['MISSION BRIEF','SCIENCE STATION','IMPACT STATION','EVIDENCE STATION'];$('stationView').innerHTML=`<p class="eyebrow">${scienceData[missionKey].title}</p><h1>${topic}</h1><h2>${titles[station]}</h2><p>${item.stations[station]}</p><p class="fallback-note">Use this to help plan your one-pager.</p><div class="station-nav"><button class="small-btn" onclick="prevStation()">BACK</button><button class="small-btn" onclick="nextStation()">${station===item.stations.length-1?'FINISH':'NEXT'}</button></div>`;}
  function nextStation(){const item=scienceData[missionKey].topics[topic];if(station<item.stations.length-1){station++;showStation();}else{localStorage.setItem('labComplete','yes');location.href='index.html';}}
  function prevStation(){if(station>0){station--;showStation();}else{$('stationView').classList.add('hidden');$('topicChooser').classList.remove('hidden');}}
  function backHome(){$('topicChooser').classList.add('hidden');$('missionChooser').classList.remove('hidden');}
  </script>
</body>
</html>

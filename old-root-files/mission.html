<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MISSION | FALCON FLIGHT SCHOOL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Atkinson+Hyperlegible:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page page-mission">
  <div class="falcon-sky" aria-hidden="true"></div>
  <header class="topbar mission-topbar">
    <a class="brand" href="index.html">🦅 FLIGHT SCHOOL</a>
    <div class="top-stats">
      <span id="levelPill">MISSION 1</span>
      <span id="livesPill">LIVES: ❤❤❤</span>
      <span id="progressPill">1 / 15</span>
      <button id="soundBtn" class="mini-btn" type="button">SOUND: ON</button>
    </div>
  </header>

  <main class="mission-shell">
    <section class="flight-panel">
      <div class="scene-card" id="sceneCard" aria-hidden="true"></div>
      <div class="mission-info">
        <p class="eyebrow" id="missionTag">MISSION</p>
        <h1 id="missionTitle">LOADING</h1>
        <div class="flight-path"><div id="flightFill"></div><span id="falconMarker">🦅</span></div>
      </div>
    </section>

    <section class="game-card" aria-live="polite">
      <div id="promptType" class="prompt-type">QUESTION</div>
      <h2 id="questionText">Loading...</h2>
      <div id="visualArea" class="visual-area"></div>
      <div id="answerArea" class="answer-area"></div>
      <div class="game-actions">
        <button id="checkBtn" class="game-btn primary" type="button">CHECK</button>
        <button id="nextBtn" class="game-btn hidden" type="button">NEXT FLIGHT</button>
      </div>
      <p id="feedback" class="feedback"></p>
    </section>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h2 id="modalTitle">MISSION COMPLETE</h2>
      <p id="modalText">Great flying.</p>
      <div id="modalButtons" class="hero-actions"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>

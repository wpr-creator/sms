<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EXPEDITION CORPS</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bungee&family=Atkinson+Hyperlegible:wght@400;700;800&display=swap" rel="stylesheet"><style>
:root{--navy:#072a4f;--gold:#f6c84c;--sky:#9ed8ff;--ink:#10243d;--paper:rgba(255,255,255,.92);--line:rgba(255,255,255,.35)}
*{box-sizing:border-box}body{margin:0;font-family:'Atkinson Hyperlegible',system-ui,sans-serif;background:#07182e;color:white;min-height:100vh;overflow-x:hidden}a{color:inherit}.world{min-height:100vh;position:relative;background-size:cover;background-position:center;isolation:isolate}.world:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(5,20,39,.72),rgba(5,20,39,.35),rgba(5,20,39,.68));z-index:-1}.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;gap:16px}.back{background:rgba(255,255,255,.14);border:1px solid var(--line);border-radius:999px;padding:10px 16px;text-decoration:none;font-weight:900}.badge{background:var(--gold);color:var(--navy);border-radius:999px;padding:10px 14px;font-weight:1000;box-shadow:0 8px 18px rgba(0,0,0,.2)}.hero{max-width:1120px;margin:0 auto;padding:10px 20px 28px;display:grid;grid-template-columns:1.1fr .9fr;gap:26px;align-items:center}.title h1{font-family:'Bungee',system-ui;font-size:clamp(42px,7vw,86px);line-height:.95;margin:0;text-shadow:0 6px 0 rgba(0,0,0,.18)}.title p{font-size:clamp(19px,2.3vw,28px);line-height:1.45;max-width:700px;font-weight:800}.falcon{width:min(330px,80vw);justify-self:center;filter:drop-shadow(0 18px 18px rgba(0,0,0,.38));animation:float 2.4s ease-in-out infinite alternate}@keyframes float{from{transform:translateY(0) rotate(-2deg)}to{transform:translateY(-16px) rotate(2deg)}}.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:1120px;margin:0 auto;padding:0 20px 30px}.choice{border:1px solid var(--line);background:rgba(255,255,255,.13);color:white;border-radius:28px;padding:20px;text-align:left;cursor:pointer;min-height:150px;backdrop-filter:blur(10px);box-shadow:0 18px 30px rgba(0,0,0,.2);transition:.2s}.choice:hover,.choice:focus{transform:translateY(-6px);outline:4px solid rgba(246,200,76,.55)}.choice .emoji{font-size:38px}.choice h2{font-family:'Bungee';font-size:24px;margin:8px 0 4px}.choice p{font-size:18px;line-height:1.35;margin:0;font-weight:800}.mission{max-width:1120px;margin:0 auto;padding:0 20px 38px;display:none}.mission.active{display:block}.scene{position:relative;min-height:520px;border-radius:34px;overflow:hidden;border:1px solid var(--line);box-shadow:0 28px 60px rgba(0,0,0,.35);background-size:cover;background-position:center}.scene:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.3))}.mini-title{position:absolute;left:22px;top:20px;z-index:2;background:rgba(7,42,79,.78);border:1px solid var(--line);border-radius:22px;padding:14px 18px;font-family:'Bungee';font-size:24px}.helper{position:absolute;right:20px;bottom:18px;width:170px;z-index:2;filter:drop-shadow(0 12px 12px rgba(0,0,0,.35))}.hotspot{position:absolute;z-index:3;border:0;border-radius:22px;background:linear-gradient(180deg,#fff,#ffe9a6);color:var(--navy);font-weight:1000;font-size:18px;padding:16px 18px;box-shadow:0 14px 24px rgba(0,0,0,.28);cursor:pointer;min-width:150px}.hotspot:hover,.hotspot:focus{transform:scale(1.05);outline:4px solid rgba(246,200,76,.55)}.h1{left:8%;top:36%}.h2{left:36%;top:20%}.h3{right:10%;top:32%}.h4{left:26%;bottom:18%}.h5{right:28%;bottom:18%}.panel{display:none;position:fixed;inset:auto 18px 18px 18px;max-width:980px;margin:auto;z-index:10;background:var(--paper);color:var(--ink);border:4px solid var(--gold);border-radius:28px;padding:22px;box-shadow:0 25px 80px rgba(0,0,0,.45)}.panel.show{display:block}.panel h2{font-family:'Bungee';font-size:32px;margin:0 0 10px;color:var(--navy)}.panel p,.panel li{font-size:20px;line-height:1.55}.panel ul{margin:8px 0 0;padding-left:24px}.evidence{background:#fff4c8;border:2px dashed #bd8c00;border-radius:18px;padding:14px;margin-top:14px;font-weight:900}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}.btn{border:0;border-radius:999px;padding:13px 18px;font-weight:1000;font-size:17px;cursor:pointer;background:var(--navy);color:white}.btn.gold{background:var(--gold);color:var(--navy)}.ready{background:rgba(255,255,255,.92);color:var(--ink);border-radius:28px;padding:22px;margin-top:18px;display:none}.ready.show{display:block}.ready h2{font-family:'Bungee';margin:0 0 8px;color:var(--navy)}@media(max-width:850px){.hero{grid-template-columns:1fr}.choice-grid{grid-template-columns:1fr}.scene{min-height:620px}.helper{width:130px}.hotspot{font-size:16px;min-width:130px}.panel{inset:auto 10px 10px}.panel p,.panel li{font-size:18px}}
</style></head><body><main class="world" id="world" style="background-image:url('bg-expedition-hub.png')"><div class="topbar"><a class="back" href="index.html">← CAMP</a><div class="badge" id="progress">0 FINDS</div></div><section class="hero" id="home"><div class="title"><h1>EXPEDITION CORPS</h1><p>Choose a route. Search the scene. Collect ideas for your one-pager.</p></div><img class="falcon" src="falcon-explorer.png" alt=""></section><section class="choice-grid" id="choices"><button class="choice" data-mission="hero"><div class="emoji">🏛️</div><h2>HALL OF FAME</h2><p>Nominate a community hero.</p></button><button class="choice" data-mission="geo"><div class="emoji">🗺️</div><h2>GEOGRAPHY REALTOR</h2><p>Sell a great place to live.</p></button><button class="choice" data-mission="shop"><div class="emoji">🛒</div><h2>SMART SHOPPER</h2><p>Spend $25 wisely.</p></button></section><section class="mission" id="mission"><div class="scene" id="scene"><div class="mini-title" id="missionTitle">MISSION</div><img class="helper" src="falcon-explorer.png" alt=""><button class="hotspot h1" data-scan="one">🔎 FIND 1</button><button class="hotspot h2" data-scan="two">🔎 FIND 2</button><button class="hotspot h3" data-scan="three">🔎 FIND 3</button><button class="hotspot h4" data-scan="four">🔎 EVIDENCE</button><button class="hotspot h5" data-scan="five">✅ READY</button></div><div class="ready" id="ready"><h2>ONE-PAGER READY</h2><p id="readyText">Use your notes to build your one-pager.</p><button class="btn gold" id="newMission">CHOOSE NEW MISSION</button></div></section></main><aside class="panel" id="panel"><h2 id="panelTitle">FIND</h2><div id="panelBody"></div><div class="actions"><button class="btn gold" id="collect">COLLECT</button><button class="btn" id="closePanel">BACK TO SCENE</button></div></aside><script>
const data={
 hero:{title:'HALL OF FAME',bg:'bg-community.png',ready:'You have job facts, skills, tools, impact, challenge, and evidence.',scans:{one:['👩‍🚒 CHOOSE A HERO','Pick one helper: firefighter, nurse, teacher, librarian, or sanitation worker. Think about how they help the community.'],two:['🛠️ TOOLS AND SKILLS','List 3 skills and important tools. Examples: communication, bravery, patience, problem solving, safety gear, books, medical tools.'],three:['🤝 COMMUNITY IMPACT','Explain who this person helps and why the job matters. A community works better when people help each other.'],four:['📌 TEXT EVIDENCE','Copy one quote from the website with the paragraph number. Choose a quote that proves why this helper matters.'],five:['🎤 HALL OF FAME SPEECH','Write 3 to 5 sentences explaining why this helper deserves recognition.']}},
 geo:{title:'GEOGRAPHY REALTOR',bg:'bg-geography.png',ready:'You have location facts, climate, landforms, advantages, challenges, and evidence.',scans:{one:['📍 CHOOSE A LOCATION','Pick one place: coast, mountains, desert, or valley. Think about what a family would see and do there.'],two:['🌤️ CLIMATE AND LANDFORMS','Describe the weather and land features. Look for beaches, rivers, mountains, flat land, forests, or dry areas.'],three:['⭐ ADVANTAGES AND CHALLENGES','List 3 good reasons to live there and 2 challenges. Every place has benefits and trade-offs.'],four:['📌 TEXT EVIDENCE','Copy one quote from the website with the paragraph number. Use it to support your moving pitch.'],five:['🏡 MOVING PITCH','Write a persuasive paragraph telling a family why this location could be a great place to live.']}},
 shop:{title:'SMART SHOPPER',bg:'bg-market.png',ready:'You have needs, wants, goods, services, spending choices, savings, and evidence.',scans:{one:['💵 BUDGET CHECK','You have $25. Decide how much to spend and how much to save. Smart shoppers plan before buying.'],two:['✅ NEEDS AND WANTS','Choose 3 needs and 3 wants. Needs help people live safely. Wants are nice to have but not required.'],three:['📦 GOODS AND SERVICES','Goods are things you can buy and hold. Services are jobs people do for others, like a haircut or car wash.'],four:['📌 TEXT EVIDENCE','Copy one quote from the website with the paragraph number. Choose a quote about choices, needs, wants, goods, or services.'],five:['🧠 SPENDING DECISION','Explain why you chose your items. Tell how much you saved and why saving can be helpful.']}}
};
let current=null, collected=0;const world=document.getElementById('world'),home=document.getElementById('home'),choices=document.getElementById('choices'),mission=document.getElementById('mission'),scene=document.getElementById('scene'),title=document.getElementById('missionTitle'),panel=document.getElementById('panel'),panelTitle=document.getElementById('panelTitle'),panelBody=document.getElementById('panelBody'),ready=document.getElementById('ready'),readyText=document.getElementById('readyText'),progress=document.getElementById('progress');
function beep(){try{let a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=520;o.start();g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.15);setTimeout(()=>a.close(),180)}catch(e){}}
document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{current=data[b.dataset.mission];home.style.display='none';choices.style.display='none';mission.classList.add('active');title.textContent=current.title;world.style.backgroundImage=`url('${current.bg}')`;scene.style.backgroundImage=`url('${current.bg}')`;ready.classList.remove('show');collected=0;progress.textContent='0 FINDS';beep();});
document.querySelectorAll('.hotspot').forEach(b=>b.onclick=()=>{let s=current.scans[b.dataset.scan];panelTitle.textContent=s[0];panelBody.innerHTML=`<p>${s[1]}</p><div class="evidence">✏️ Add this to your notes if it helps your one-pager.</div>`;panel.classList.add('show');beep();});
document.getElementById('collect').onclick=()=>{collected=Math.min(5,collected+1);progress.textContent=collected+' FINDS';panel.classList.remove('show');if(collected>=5){ready.classList.add('show');readyText.textContent=current.ready}beep();};
document.getElementById('closePanel').onclick=()=>panel.classList.remove('show');document.getElementById('newMission').onclick=()=>{mission.classList.remove('active');home.style.display='grid';choices.style.display='grid';world.style.backgroundImage="url('bg-expedition-hub.png')";progress.textContent='0 FINDS';};
</script></body></html>

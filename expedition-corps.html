<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expedition Corps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Atkinson+Hyperlegible:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="expedition-page">
  <div class="page-bg expedition-bg" id="expBg"></div>
  <header class="topbar"><a href="index.html">← CAMP</a><div class="topbar-title">EXPEDITION CORPS</div><div>SOCIAL STUDIES</div></header>
  <main class="expedition-shell">
    <section class="mission-card" id="missionChooser">
      <p class="eyebrow">CHOOSE AN EXPEDITION</p>
      <h1>EXPEDITION CORPS</h1>
      <p class="kid-line">Pick a mission. Read the cards. Collect ideas for your one-pager.</p>
      <div class="mission-grid">
        <button class="choice-card" data-mission="hero"><h3>HERO HALL</h3><p>Nominate a community helper.</p></button>
        <button class="choice-card" data-mission="geo"><h3>GEOGRAPHY REALTOR</h3><p>Sell a place to live.</p></button>
        <button class="choice-card" data-mission="shop"><h3>SMART SHOPPER</h3><p>Spend $25 wisely.</p></button>
      </div>
    </section>
    <section class="mission-card hidden" id="topicChooser"></section>
    <section class="mission-card hidden reader-card" id="stationView"></section>
  </main>
  <img class="character-side" src="falcon-explorer.png" alt="Explorer falcon" onerror="this.style.display='none'">
  <script>
  const socialData={
    hero:{title:'COMMUNITY HERO HALL',bg:'bg-community.png',topics:{
      Firefighter:['Firefighters help during fires, car crashes, and emergencies. They use teamwork and quick thinking.','Important tools include hoses, helmets, ladders, radios, and fire trucks.','Community impact: firefighters protect people, homes, schools, and neighborhoods.','Evidence idea: Find one quote that shows how this helper keeps people safe.'],
      Nurse:['Nurses help people feel better and stay healthy. They care for patients and explain health needs.','Important tools include thermometers, bandages, gloves, charts, and medicine supplies.','Community impact: nurses help families during sickness, injuries, and checkups.','Evidence idea: Find one quote that shows how this helper cares for people.'],
      Teacher:['Teachers help students learn skills, solve problems, and build confidence.','Important tools include books, lessons, computers, pencils, and classroom materials.','Community impact: teachers help children grow and prepare for the future.','Evidence idea: Find one quote that shows how this helper supports learning.'],
      Librarian:['Librarians help people find books, information, and technology resources.','Important tools include books, computers, library cards, shelves, and research tools.','Community impact: libraries give people a place to read, learn, and explore ideas.','Evidence idea: Find one quote that shows how this helper connects people to information.'],
      'Park Ranger':['Park rangers protect parks, animals, trails, and visitors.','Important tools include maps, radios, signs, first aid kits, and nature guides.','Community impact: rangers help people enjoy nature safely and protect natural spaces.','Evidence idea: Find one quote that shows how this helper protects a place.']
    }},
    geo:{title:'GEOGRAPHY REALTOR',bg:'bg-geography.png',topics:{
      Coast:['A coast is land near the ocean. It may have beaches, cliffs, bays, or harbors.','Advantages: fishing, tourism, mild weather, and ocean views can attract people.','Challenges: storms, flooding, and high housing costs can make coastal living harder.','Evidence idea: Find one quote that shows how geography affects life near water.'],
      Mountain:['A mountain area has high land, slopes, forests, and cooler weather.','Advantages: fresh air, hiking, snow sports, and natural resources can attract people.','Challenges: steep roads, cold weather, and distance from services can be hard.','Evidence idea: Find one quote that shows how landforms affect where people live.'],
      Desert:['A desert is dry and usually gets little rain. Days can be hot and nights can be cool.','Advantages: open land, sunshine, tourism, and solar energy can help communities.','Challenges: water shortages and heat can make life harder.','Evidence idea: Find one quote that shows how climate affects choices.'],
      Valley:['A valley is low land between hills or mountains. Many valleys have rivers or farms.','Advantages: farming, transportation, water, and towns can grow in valleys.','Challenges: flooding, air pollution, or crowded roads can be problems.','Evidence idea: Find one quote that shows why people settle near resources.']
    }},
    shop:{title:'SMART SHOPPER CHALLENGE',bg:'bg-market.png',topics:{
      'Lunch Plan':['You have $25. You need to buy food and still try to save some money.','Needs are things you must have, like food and water. Wants are things you would like, like a treat.','Goods are items you buy. Services are actions someone does for you.','Evidence idea: Find one quote that explains needs, wants, goods, services, or saving.'],
      'School Supplies':['You have $25. You need supplies for class and must make smart choices.','Needs may include pencils, notebook paper, and folders. Wants may include stickers or fancy pens.','A smart shopper compares prices and chooses what matters most first.','Evidence idea: Find one quote that explains making economic choices.'],
      'Pet Care':['You have $25. You need to care for a class pet or home pet.','Needs may include food and clean bedding. Wants may include toys or decorations.','Saving money can help pay for future needs.','Evidence idea: Find one quote that explains why people cannot buy everything they want.'],
      'Family Market':['You have $25. You are helping shop at a market.','Needs may include fruit, bread, and water. Wants may include cookies or small toys.','Smart choices help families use money carefully.','Evidence idea: Find one quote that explains budgets or choices.']
    }}
  };
  let missionKey=null,topic=null,station=0; const $=id=>document.getElementById(id), bg=$('expBg');
  document.querySelectorAll('[data-mission]').forEach(b=>b.onclick=()=>chooseMission(b.dataset.mission));
  function chooseMission(key){missionKey=key;const data=socialData[key];bg.style.backgroundImage=`linear-gradient(100deg,rgba(7,24,61,.62),rgba(7,24,61,.18)),url('${data.bg}')`;$('missionChooser').classList.add('hidden');$('topicChooser').classList.remove('hidden');$('topicChooser').innerHTML=`<p class="eyebrow">${data.title}</p><h1>CHOOSE YOUR TOPIC</h1><div class="mission-grid">${Object.keys(data.topics).map(t=>`<button class="choice-card" data-topic="${t}"><h3>${t}</h3><p>Open the expedition file.</p></button>`).join('')}</div><div class="station-nav"><button class="small-btn" onclick="backHome()">BACK</button></div>`;document.querySelectorAll('[data-topic]').forEach(b=>b.onclick=()=>chooseTopic(b.dataset.topic));}
  function chooseTopic(t){topic=t;station=0;showStation();}
  function showStation(){const item=socialData[missionKey].topics[topic];$('topicChooser').classList.add('hidden');$('stationView').classList.remove('hidden');const titles=['MISSION BRIEF','DETAIL STATION','IMPACT STATION','EVIDENCE STATION'];$('stationView').innerHTML=`<p class="eyebrow">${socialData[missionKey].title}</p><h1>${topic}</h1><h2>${titles[station]}</h2><p>${item[station]}</p><p class="fallback-note">Use this to help plan your one-pager.</p><div class="station-nav"><button class="small-btn" onclick="prevStation()">BACK</button><button class="small-btn" onclick="nextStation()">${station===item.length-1?'FINISH':'NEXT'}</button></div>`;}
  function nextStation(){const item=socialData[missionKey].topics[topic];if(station<item.length-1){station++;showStation();}else{localStorage.setItem('expeditionComplete','yes');location.href='index.html';}}
  function prevStation(){if(station>0){station--;showStation();}else{$('stationView').classList.add('hidden');$('topicChooser').classList.remove('hidden');}}
  function backHome(){$('topicChooser').classList.add('hidden');$('missionChooser').classList.remove('hidden');}
  </script>
</body>
</html>

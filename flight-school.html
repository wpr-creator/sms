<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flight School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Atkinson+Hyperlegible:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="flight-page">
<main class="flight-shell">
  <header class="flight-header">
    <a class="back-camp" href="index.html">CAMP</a>
    <div class="mission-head">
      <div class="mini-tag">FLIGHT SCHOOL</div>
      <h1 id="missionTitle">MULTIPLICATION CANYON</h1>
    </div>
    <div class="hud" aria-label="game progress">
      <span id="qHud">0 / 15</span>
      <span id="lifeHud">❤❤❤</span>
      <span id="badgeHud">0 BADGES</span>
    </div>
  </header>

  <section class="flight-stage desert" id="stage" aria-label="flight scene">
    <div class="sky-layer"></div>
    <img class="scene-sun" id="sceneSun" src="sun.png" alt="">
    <img class="scene-cloud cloud-one" src="cloud1.png" alt="">
    <img class="scene-cloud cloud-two" src="cloud2.png" alt="">
    <div class="level-landmarks" id="landmarks"></div>
    <div class="ground-strip" id="groundStrip"></div>
    <img class="falcon-player" id="falcon" src="falcon.png" alt="">
    <div class="boss-marker" id="bossMarker">?</div>
    <div class="stage-label" id="stageLabel">CANYON RUN</div>
  </section>

  <section class="play-panel" id="playPanel">
    <div class="start-card" id="startCard">
      <h2>READY?</h2>
      <p id="missionHint">Fly through the canyon.</p>
      <button id="startBtn" type="button">START</button>
    </div>
    <div class="question-card hidden" id="questionCard">
      <div class="question-line" id="promptText"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </section>
</main>
<script src="question-bank.js"></script>
<script src="flight-school.js"></script>
</body>
</html>

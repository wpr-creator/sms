<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Falcon Adventure Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Atkinson+Hyperlegible:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#071b35;
      --blue:#0f3d73;
      --sky:#74d7ff;
      --gold:#f3b61f;
      --gold2:#ffe27a;
      --cream:#fff8e6;
      --sand:#e6bd68;
      --green:#2f8857;
      --ink:#061629;
      --card:#fef9ea;
      --shadow:0 28px 70px rgba(3,12,28,.42);
    }
    *{box-sizing:border-box}
    html{min-height:100%;background:var(--navy)}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Atkinson Hyperlegible",system-ui,sans-serif;
      color:white;
      overflow:hidden;
      background:
        radial-gradient(circle at 10% 12%,rgba(116,215,255,.28) 0 9%,transparent 25%),
        radial-gradient(circle at 84% 15%,rgba(243,182,31,.16) 0 10%,transparent 24%),
        linear-gradient(145deg,#061426 0%,#0a315f 52%,#071b35 100%);
    }
    h1,h2,.chip,.camp-tag,.title,.dest-title,.badge,.start-pill{font-family:Bungee,Impact,sans-serif;text-transform:uppercase;letter-spacing:.04em}
    a{color:inherit;text-decoration:none}
    .stars,.grid,.clouds,.birds{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .stars{opacity:.34;background-image:radial-gradient(circle,#fff 0 1.5px,transparent 2px),radial-gradient(circle,#fff 0 1px,transparent 2px);background-size:130px 130px,210px 210px;animation:starSlide 26s linear infinite}
    .grid{opacity:.14;background-image:linear-gradient(90deg,#fff 1px,transparent 1px),linear-gradient(#fff 1px,transparent 1px);background-size:72px 72px;mask-image:linear-gradient(to bottom,transparent,black 18%,black 80%,transparent)}
    @keyframes starSlide{to{background-position:260px -130px,-210px 210px}}
    .cloud{position:absolute;width:250px;height:78px;border-radius:999px;background:rgba(255,255,255,.16);animation:cloudMove linear infinite}.cloud:before,.cloud:after{content:"";position:absolute;border-radius:50%;background:inherit}.cloud:before{width:98px;height:98px;left:34px;top:-43px}.cloud:after{width:122px;height:122px;right:34px;top:-60px}.c1{top:12%;left:-280px;animation-duration:46s}.c2{top:62%;left:-280px;animation-duration:58s;animation-delay:-20s;transform:scale(.72)}.c3{top:31%;left:-280px;animation-duration:68s;animation-delay:-38s;transform:scale(1.1)}@keyframes cloudMove{to{left:110vw}}
    .bg-bird{position:absolute;width:74px;opacity:.11;filter:drop-shadow(0 8px 6px rgba(0,0,0,.2));animation:birdMove linear infinite}.b1{top:12%;animation-duration:28s}.b2{top:34%;animation-duration:35s;animation-delay:-12s}.b3{top:54%;animation-duration:31s;animation-delay:-21s}.b4{top:77%;animation-duration:42s;animation-delay:-6s}@keyframes birdMove{from{transform:translateX(-120px) translateY(0)}50%{transform:translateX(48vw) translateY(-24px)}to{transform:translateX(calc(100vw + 120px)) translateY(18px)}}
    .app{position:relative;z-index:2;min-height:100vh;display:grid;grid-template-rows:auto 1fr;padding:22px clamp(14px,3vw,36px)}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;max-width:1220px;width:100%;margin:0 auto}.brand{display:flex;align-items:center;gap:12px}.crest{width:58px;height:58px;border-radius:18px;background:linear-gradient(145deg,var(--gold2),var(--gold));display:grid;place-items:center;border:3px solid rgba(255,255,255,.45);box-shadow:0 12px 28px rgba(0,0,0,.22)}.crest svg{width:44px}.camp-tag{font-size:13px;padding:9px 14px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.12);border-radius:999px;backdrop-filter:blur(10px)}.chip-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.chip{font-size:12px;padding:9px 12px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.11);border-radius:999px;backdrop-filter:blur(10px)}
    .stage{max-width:1220px;width:100%;margin:auto;display:grid;grid-template-columns:.9fr 1.1fr;gap:clamp(22px,4vw,48px);align-items:center}.hero{padding:clamp(22px,4vw,46px);border:2px solid rgba(255,255,255,.18);border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.05));box-shadow:var(--shadow);backdrop-filter:blur(12px);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:-2px;background:radial-gradient(circle at 5% 0%,rgba(243,182,31,.32),transparent 35%);pointer-events:none}.title{position:relative;font-size:clamp(48px,7vw,82px);line-height:.96;margin:14px 0;text-shadow:0 8px 0 rgba(0,0,0,.18)}.subtitle{position:relative;font-size:clamp(23px,3vw,34px);font-weight:900;margin:0;color:var(--gold2)}.prompt{position:relative;font-size:20px;line-height:1.6;margin:22px 0 0;color:#eff8ff;font-weight:700}.quick-start{position:relative;margin-top:28px;display:inline-flex;align-items:center;gap:12px;color:var(--navy);background:linear-gradient(180deg,var(--gold2),var(--gold));border-radius:20px;padding:15px 18px;font-family:Bungee;font-size:17px;box-shadow:0 10px 0 #9b6408,0 18px 26px rgba(0,0,0,.24);transition:.16s transform,.16s filter}.quick-start:hover{transform:translateY(-3px);filter:saturate(1.12)}.quick-start:active{transform:translateY(4px);box-shadow:0 4px 0 #9b6408}
    .map{min-height:590px;position:relative;border-radius:36px;border:2px solid rgba(255,255,255,.24);background:linear-gradient(180deg,#75d7ff 0 46%,#5eb66f 47% 73%,#dfb867 74% 100%);box-shadow:var(--shadow);overflow:hidden}.sun{position:absolute;right:38px;top:34px;width:96px;height:96px;border-radius:50%;background:radial-gradient(circle,var(--gold2),var(--gold));box-shadow:0 0 60px rgba(243,182,31,.55)}.hill{position:absolute;bottom:144px;width:360px;height:180px;border-radius:50% 50% 0 0;background:#2d7650;opacity:.9}.h1{left:-60px}.h2{left:215px;bottom:158px;background:#3f8e58}.h3{right:-50px}.trail{position:absolute;left:7%;right:7%;bottom:99px;height:150px;border-top:14px dashed rgba(255,248,230,.72);border-radius:50%;transform:rotate(-2deg)}.map-falcon{position:absolute;width:92px;left:30%;bottom:263px;animation:float 2.5s ease-in-out infinite;filter:drop-shadow(0 10px 8px rgba(0,0,0,.32))}@keyframes float{50%{transform:translateY(-12px) rotate(-2deg)}}
    .dest-row{position:absolute;left:34px;right:34px;top:116px;display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:stretch}.destination{min-height:332px;border-radius:30px;background:rgba(255,248,230,.96);color:var(--ink);border:4px solid var(--navy);box-shadow:0 14px 0 rgba(7,27,53,.30),0 26px 34px rgba(0,0,0,.22);padding:16px;text-align:center;transition:.18s transform,.18s filter;display:flex;flex-direction:column;align-items:center;justify-content:space-between}.destination:hover{transform:translateY(-8px) scale(1.015);filter:saturate(1.08)}.destination.active{outline:5px solid var(--gold)}.destination.locked{filter:saturate(.75);opacity:.88;cursor:default}.dest-art{width:100%;height:128px;border-radius:22px;background:linear-gradient(180deg,#dff6ff,#fff);border:3px solid rgba(7,27,53,.16);display:grid;place-items:center;overflow:hidden}.dest-art svg{width:100%;height:100%}.dest-title{font-size:clamp(20px,2vw,28px);margin:10px 0 2px;color:var(--navy);line-height:1.05}.subject{font-weight:900;color:#345;letter-spacing:.05em;font-size:18px}.start-pill{display:inline-block;margin-top:10px;border-radius:999px;padding:8px 14px;background:var(--gold);color:var(--navy);font-size:13px}.soon{background:#dbe7f2;color:#30445d}.badge{position:absolute;left:28px;top:28px;background:rgba(255,255,255,.92);color:var(--navy);border-radius:999px;padding:8px 12px;font-size:12px;border:2px solid rgba(7,27,53,.16)}
    .wipe{position:fixed;inset:0;background:radial-gradient(circle at 50% 50%,var(--gold) 0 5%,var(--navy) 6%);z-index:9;opacity:0;pointer-events:none;transition:opacity .35s}.wipe.on{opacity:1}.sr-only{position:absolute;width:1px;height:1px;clip:rect(0,0,0,0);overflow:hidden}
    @media(max-width:1000px){body{overflow:auto}.app{min-height:auto}.stage{grid-template-columns:1fr;padding:24px 0}.map{min-height:680px}.dest-row{top:104px;grid-template-columns:1fr;left:clamp(18px,8vw,90px);right:clamp(18px,8vw,90px)}.destination{min-height:250px}.dest-art{height:100px}.map-falcon{left:8%;bottom:416px}.trail{bottom:110px;height:400px;transform:rotate(6deg)}}
    @media(max-width:620px){.topbar{align-items:flex-start;flex-direction:column}.chip-row{justify-content:flex-start}.title{font-size:48px}.prompt{font-size:18px}.map{min-height:820px}.quick-start{width:100%;justify-content:center}.destination{min-height:220px}.dest-row{gap:18px}}
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="falconMark" viewBox="0 0 120 90">
      <path d="M13 53 C31 27,57 14,99 18 C82 25,73 38,66 54 C58 73,38 81,18 72 C28 69,39 64,46 54 C35 59,24 59,13 53Z" fill="#071b35"/>
      <path d="M45 45 C59 30,75 24,103 21 C88 31,78 43,71 59 C62 54,54 49,45 45Z" fill="#f3b61f"/>
      <path d="M31 56 C45 48,59 47,75 62 C59 66,44 65,31 56Z" fill="#fff8e6"/>
      <path d="M80 27 L108 31 L84 40 Z" fill="#fff8e6"/>
      <circle cx="86" cy="30" r="3" fill="#071b35"/>
      <path d="M103 31 L118 35 L102 42 Z" fill="#f3b61f"/>
    </symbol>
  </svg>
  <div class="stars"></div><div class="grid"></div>
  <div class="clouds"><span class="cloud c1"></span><span class="cloud c2"></span><span class="cloud c3"></span></div>
  <div class="birds" aria-hidden="true"><svg class="bg-bird b1" viewBox="0 0 120 90"><use href="#falconMark"/></svg><svg class="bg-bird b2" viewBox="0 0 120 90"><use href="#falconMark"/></svg><svg class="bg-bird b3" viewBox="0 0 120 90"><use href="#falconMark"/></svg><svg class="bg-bird b4" viewBox="0 0 120 90"><use href="#falconMark"/></svg></div>
  <div class="wipe" id="wipe"></div>
  <main class="app">
    <header class="topbar">
      <div class="brand"><div class="crest"><svg viewBox="0 0 120 90"><use href="#falconMark"/></svg></div><div class="camp-tag">SUMMER QUEST</div></div>
      <div class="chip-row"><span class="chip">RANK: SKY SCOUT</span><span class="chip">BADGES: 0</span><span class="chip">PATHS: 1 OPEN</span></div>
    </header>
    <section class="stage" aria-label="Falcon Adventure Camp">
      <div class="hero">
        <h1 class="title">FALCON ADVENTURE CAMP</h1>
        <p class="subtitle">CHOOSE YOUR PATH</p>
        <p class="prompt">Start with math. More camp paths open soon.</p>
        <a class="quick-start" href="./flight-school/" data-go>ENTER FLIGHT SCHOOL</a>
      </div>
      <div class="map" id="camp-map">
        <div class="sun"></div><div class="hill h1"></div><div class="hill h2"></div><div class="hill h3"></div><div class="trail"></div>
        <div class="badge">CAMP MAP</div>
        <svg class="map-falcon" viewBox="0 0 120 90"><use href="#falconMark"/></svg>
        <div class="dest-row">
          <a class="destination active" href="./flight-school/" data-go aria-label="Enter Flight School math game">
            <div class="dest-art"><svg viewBox="0 0 220 120"><rect x="20" y="48" width="180" height="58" rx="12" fill="#0f3d73"/><path d="M30 50 Q110 5 190 50" fill="#fff8e6" stroke="#071b35" stroke-width="7"/><rect x="56" y="62" width="108" height="44" rx="8" fill="#f3b61f"/><path d="M70 84 H150" stroke="#071b35" stroke-width="7"/><path d="M110 16 L138 43 H82 Z" fill="#f3b61f" stroke="#071b35" stroke-width="5"/></svg></div>
            <div><h2 class="dest-title">FLIGHT SCHOOL</h2><div class="subject">MATH</div><span class="start-pill">ENTER</span></div>
          </a>
          <a class="destination locked" href="./field-lab/" aria-label="Field Lab coming soon">
            <div class="dest-art"><svg viewBox="0 0 220 120"><rect x="38" y="60" width="144" height="46" rx="12" fill="#fff8e6" stroke="#071b35" stroke-width="7"/><path d="M70 62 Q110 12 150 62" fill="#7bd7ff" stroke="#071b35" stroke-width="7"/><rect x="92" y="22" width="36" height="80" rx="10" fill="#f3b61f" stroke="#071b35" stroke-width="5"/><circle cx="110" cy="42" r="8" fill="#fff"/></svg></div>
            <div><h2 class="dest-title">FIELD LAB</h2><div class="subject">SCIENCE</div><span class="start-pill soon">COMING SOON</span></div>
          </a>
          <a class="destination locked" href="./expedition-corps/" aria-label="Expedition Corps coming soon">
            <div class="dest-art"><svg viewBox="0 0 220 120"><path d="M34 58 L110 16 L186 58 V106 H34 Z" fill="#f6d99a" stroke="#071b35" stroke-width="7"/><path d="M20 62 L110 10 L200 62" fill="none" stroke="#0f3d73" stroke-width="12" stroke-linecap="round"/><rect x="88" y="72" width="44" height="34" rx="6" fill="#0f3d73"/><path d="M155 70 l18 8 l-18 8 Z" fill="#f3b61f" stroke="#071b35" stroke-width="4"/><line x1="155" y1="65" x2="155" y2="105" stroke="#071b35" stroke-width="5"/></svg></div>
            <div><h2 class="dest-title">EXPEDITION CORPS</h2><div class="subject">SOCIAL STUDIES</div><span class="start-pill soon">COMING SOON</span></div>
          </a>
        </div>
      </div>
    </section>
  </main>
  <script>
    const wipe=document.getElementById('wipe');
    function tone(freq=440,duration=.12,type='sine',gain=.045){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=gain;o.connect(g);g.connect(ctx.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+duration);o.stop(ctx.currentTime+duration+.02)}catch(e){}}
    document.querySelectorAll('[data-go]').forEach(link=>{link.addEventListener('click',e=>{e.preventDefault();tone(640,.08,'triangle');setTimeout(()=>tone(880,.12,'triangle'),70);wipe.classList.add('on');setTimeout(()=>{window.location.href=link.href},360)})});
  </script>
</body>
</html>

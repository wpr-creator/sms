<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Falcon Adventure Camp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Atkinson+Hyperlegible:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="camp-page">
<main class="camp-shell">
  <section class="camp-hero">
    <div class="camp-copy">
      <div class="mini-tag">SUMMER QUEST</div>
      <img class="camp-falcon" src="falcon.png" alt="">
      <h1>FALCON ADVENTURE CAMP</h1>
      <h2>CHOOSE YOUR PATH</h2>
    </div>
    <div class="camp-map" aria-label="Camp paths">
      <img class="map-sun" src="sun.png" alt="">
      <img class="map-cloud cloud-a" src="cloud1.png" alt="">
      <img class="map-cloud cloud-b" src="cloud2.png" alt="">
      <div class="camp-card active" onclick="location.href='flight-school.html'">
        <img src="falcon.png" alt="">
        <span>MATH</span>
        <strong>FLIGHT SCHOOL</strong>
        <button>ENTER</button>
      </div>
      <div class="camp-card locked">
        <img src="tree03.png" alt="">
        <span>SCIENCE</span>
        <strong>FIELD LAB</strong>
        <button>SOON</button>
      </div>
      <div class="camp-card locked">
        <img src="tower_beige.png" alt="">
        <span>SOCIAL STUDIES</span>
        <strong>EXPEDITION CORPS</strong>
        <button>SOON</button>
      </div>
    </div>
  </section>
</main>
<script src="camp.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Falcon Adventure Camp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Atkinson+Hyperlegible:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="camp-page">
<main class="camp-shell">
  <section class="camp-hero">
    <div class="camp-copy">
      <img class="camp-falcon big" src="falcon.png" alt="">
      <div class="mini-tag">SUMMER QUEST</div>
      <h1>FALCON ADVENTURE CAMP</h1>
      <h2>CHOOSE YOUR PATH</h2>
    </div>
    <section class="camp-map" aria-label="camp map">
      <img class="map-sun" src="sun.png" alt="">
      <img class="map-cloud cloud-a" src="cloud1.png" alt="">
      <img class="map-cloud cloud-b" src="cloud2.png" alt="">
      <img class="camp-falcon map-flyer" src="falcon.png" alt="">
      <div class="trail"></div>
      <a class="camp-card active flight-card" href="flight-school.html">
        <div class="card-icon hangar-icon"><span></span></div>
        <strong>FLIGHT SCHOOL</strong>
        <span>MATH</span>
      </a>
      <a class="camp-card locked lab-card" href="field-lab.html">
        <div class="card-icon lab-icon"><span></span></div>
        <strong>FIELD LAB</strong>
        <span>SCIENCE</span>
        <em>COMING SOON</em>
      </a>
      <a class="camp-card locked explore-card" href="expedition-corps.html">
        <div class="card-icon lodge-icon"><span></span></div>
        <strong>EXPEDITION CORPS</strong>
        <span>SOCIAL STUDIES</span>
        <em>COMING SOON</em>
      </a>
    </section>
  </section>
</main>
<script src="camp.js"></script>
</body>
</html>

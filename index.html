<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falcon Adventure Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Atkinson+Hyperlegible:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="camp-page">
  <div class="page-bg camp-bg"></div>
  <div class="sky-drift" aria-hidden="true"></div>
  <main class="camp-shell">
    <section class="camp-hero" aria-label="Falcon Adventure Camp">
      <div class="camp-copy">
        <p class="eyebrow">SUMMER QUEST</p>
        <h1>FALCON ADVENTURE CAMP</h1>
        <p class="kid-line">Pick a path. Earn badges. Keep moving.</p>
        <div class="camp-stats" aria-label="Camp progress">
          <span id="rankPill">RANK: SKY SCOUT</span>
          <span id="badgePill">BADGES: 0</span>
          <span id="pathPill">PATHS: 0/3</span>
        </div>
      </div>
      <img class="camp-falcon" src="falcon-camp.png" alt="Camp guide falcon" onerror="this.src='falcon.png'" />
    </section>

    <section class="camp-map" aria-label="Choose your camp path">
      <a class="zone-card zone-flight" href="flight-school.html" data-zone="flight">
        <div class="zone-art hangar-art" aria-hidden="true"><span>✈</span></div>
        <p class="zone-subject">MATH</p>
        <h2>FLIGHT SCHOOL</h2>
        <p class="zone-action">TAKE OFF!</p>
      </a>

      <a class="zone-card zone-lab" href="field-lab.html" data-zone="lab">
        <div class="zone-art lab-art" aria-hidden="true"><img src="falcon-science.png" alt="" onerror="this.style.display='none'"></div>
        <p class="zone-subject">SCIENCE</p>
        <h2>FIELD LAB</h2>
        <p class="zone-action">EXPLORE!</p>
      </a>

      <a class="zone-card zone-expedition" href="expedition-corps.html" data-zone="expedition">
        <div class="zone-art map-art" aria-hidden="true"><img src="falcon-explorer.png" alt="" onerror="this.style.display='none'"></div>
        <p class="zone-subject">SOCIAL STUDIES</p>
        <h2>EXPEDITION CORPS</h2>
        <p class="zone-action">LET'S GO!</p>
      </a>
    </section>
  </main>
  <div class="screen-wipe" id="screenWipe"></div>
  <script src="camp.js"></script>
</body>
</html>
